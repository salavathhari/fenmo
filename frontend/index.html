<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Expense Tracker</h1>

      <section class="card">
        <h2>Add Expense</h2>
        <form id="expense-form">
          <div class="form-grid">
            <label>
              Amount (INR)
              <input id="amount" name="amount" type="number" step="0.01" min="0.01" required />
            </label>

            <label>
              Date
              <input id="date" name="date" type="date" required />
            </label>

            <label>
              Category
              <input id="category" name="category" type="text" required />
            </label>

            <label>
              Description
              <input id="description" name="description" type="text" required />
            </label>
          </div>

          <button id="submit-btn" type="submit">Add Expense</button>
          <button id="retry-btn" type="button" hidden>Retry Last Submit</button>
          <p id="form-status" class="status"></p>
        </form>
      </section>

      <section class="card">
        <h2>Expenses</h2>
        <div class="controls">
          <label>
            Filter Category
            <input id="filter-category" type="text" placeholder="e.g. Food" />
          </label>

          <label>
            Sort
            <select id="sort-order">
              <option value="">Oldest First</option>
              <option value="date_desc">Newest First</option>
            </select>
          </label>

          <button id="refresh-btn" type="button">Refresh</button>
        </div>

        <p id="list-status" class="status"></p>
        <p id="total" class="total">Total: ₹0.00</p>
        <div class="summary-block">
          <h3>Category Summary</h3>
          <ul id="category-summary"></ul>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody id="expenses-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
